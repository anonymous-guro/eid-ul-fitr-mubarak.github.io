<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eid Mubarak</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Montserrat:wght@200;400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Montserrat", sans-serif;
      }

      /* 1. THE DREAMY BACKGROUND */
      .bg-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.6)),
          url("https://images.unsplash.com/photo-1496062031456-07b8f162a322?q=80&w=2000&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        filter: saturate(1.1) contrast(1.1);
        z-index: -1;
        animation: slowMove 20s infinite alternate linear;
      }

      @keyframes slowMove {
        from {
          transform: scale(1.1) translateX(-2%);
        }
        to {
          transform: scale(1) translateX(2%);
        }
      }

      /* 2. THE FLOATING CARD (Mobile Responsive) */
      .glass-wrap {
        position: relative;
        z-index: 10;
        margin-top: 250px;
        text-align: center;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-radius: 100px 100px 20px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        max-width: 380px; /* Adjusted for mobile width */
        width: 85%;
        animation: float 6s infinite ease-in-out;
      }

      .flower-circle {
        width: 100px; /* Smaller for mobile */
        height: 100px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.8);
        margin: -90px auto 25px; /* Adjusted offset */
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .flower-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 3rem; /* Scaled down for mobile */
        font-style: italic;
        font-weight: 300;
        color: #ffffff;
        margin-bottom: 10px;
        line-height: 1;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      }

      .indirect-msg {
        font-size: 0.85rem; /* Slightly smaller text */
        line-height: 1.8;
        color: #ffffff;
        font-weight: 200;
        letter-spacing: 0.5px;
        opacity: 0.9;
        margin-bottom: 20px;
      }

      .subtitle {
        font-size: 0.65rem;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        margin-bottom: 5px;
        display: block;
      }

      /* 4. STAR SHAPED SPARKLES */
      .sparkle {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #fff;
        clip-path: polygon(
          50% 0%,
          61% 35%,
          98% 35%,
          68% 57%,
          79% 91%,
          50% 70%,
          21% 91%,
          32% 57%,
          2% 35%,
          39% 35%
        );
        pointer-events: none;
        z-index: 5;
        animation: starShimmer 4s infinite ease-in-out;
      }

      /* MOBILE SPECIFIC ADJUSTMENTS */
      @media (max-width: 480px) {
        h1 {
          font-size: 2.8rem;
        }
        .glass-wrap {
          border-radius: 80px 80px 20px 20px;
        }
        .flower-circle {
          width: 90px;
          height: 90px;
          margin-top: -85px;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      @keyframes starShimmer {
        0% {
          transform: scale(0) rotate(0deg);
          opacity: 0;
        }
        50% {
          transform: scale(1.2) rotate(180deg);
          opacity: 0.8;
        }
        100% {
          transform: scale(0) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer"></div>

    <div class="glass-wrap">
      <div class="flower-circle">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTaB_GHk8LBOZLEEt0ynB0-zuuj5ftG07VlVg&s"
          alt="Rose"
        />
      </div>

      <span class="subtitle">The First Light</span>

      <h1>Eid Mubarak</h1>

      <div
        style="
          width: 30px;
          height: 1px;
          background: rgba(255, 255, 255, 0.3);
          margin: 15px auto;
        "
      ></div>

      <p class="indirect-msg">
        There is a quiet beauty in the way <br />
        the sun rises today. <br />
        Wishing you a day that reflects <br />
        the peace you carry so effortlessly.
      </p>

      <p
        style="
          font-size: 0.6rem;
          color: rgba(255, 255, 255, 0.4);
          letter-spacing: 2px;
        "
      >
        — Sent with Sincerity
      </p>
    </div>

    <script>
      function createSparkle() {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";

        const size = Math.random() * 8 + 4 + "px";
        s.style.width = size;
        s.style.height = size;

        s.style.animationDelay = Math.random() * 4 + "s";
        s.style.animationDuration = Math.random() * 2 + 2 + "s";

        document.body.appendChild(s);
      }

      for (let i = 0; i < 35; i++) {
        createSparkle();
      }
    </script>
  </body>
</html>
